<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>Meu Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <span class="eyebrow">MINI APP TELEGRAM</span>
        <h1>Bem-vindo</h1>
        <p>Uma base responsiva pronta para conectar ao seu bot.</p>
      </header>

      <section class="card" aria-labelledby="action-title">
        <div class="card-icon" aria-hidden="true">T</div>
        <div>
          <h2 id="action-title">Primeira ação</h2>
          <p>Este botão envia um evento de teste para o bot pelo Telegram.</p>
        </div>
        <button id="send-button" type="button">Enviar para o bot</button>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <p class="notice" id="environment-notice" hidden>
        Prévia no navegador. Abra pelo Telegram para testar a integração completa.
      </p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
